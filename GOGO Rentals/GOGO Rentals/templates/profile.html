<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - GoGo RENTALS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-primary: #121212;
        --bg-secondary: #1e1e1e;
        --bg-tertiary: #2a2a2a;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --accent-primary: #7b68ee;
        --accent-secondary: #6a5acd;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --border-color: #404040;
    }

    body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        transition: all 0.3s ease;
    }

    .card {
        background-color: var(--bg-secondary);
        border: none;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .card-header {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        color: #fff;
        font-weight: 600;
        font-size: 1.25rem;
        border-bottom: none;
        text-align: center;
    }

    .profile-header {
    position: relative;
    padding: 0;
    overflow: visible; /* allow avatar to go outside */
    }

    .profile-bg {
        height: 120px;
        background: url('{{ url_for("static", filename="images/car-bg.jpg") }}') center/cover no-repeat, 
                    linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        opacity: 0.85;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
    }

    .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--bg-tertiary);
        position: absolute;
        top: -40px; /* move above the header */
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 4px solid var(--bg-secondary);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        z-index: 10;
    }


    .profile-avatar i {
        font-size: 2.5rem;
        color: var(--text-secondary);
    }

    h3, h5 {
        color: var(--text-primary);
        font-weight: 600;
    }

    .form-control:disabled {
    background-color: var(--bg-tertiary); /* dark input */
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    opacity: 1; /* ensures it doesn’t appear faded */
    -webkit-text-fill-color: var(--text-primary); /* for Chrome/Edge */
    }


    .form-control:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 0.2rem rgba(123,104,238,0.25);
    }

    .form-label {
        font-weight: 500;
        color: var(--text-primary);
    }

    .form-text {
        color: var(--text-secondary);
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        border: none;
        border-radius: 10px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(123,104,238,0.4);
    }

    .btn-warning {
        background: linear-gradient(135deg, var(--warning), #ff9900);
        border: none;
        border-radius: 10px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        color: #1e1e1e;
        transition: all 0.3s ease;
    }

    .btn-warning:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(255,204,0,0.4);
    }

    .input-group-text {
        background-color: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        border-radius: 10px 0 0 10px;
    }
</style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <!-- Back Button -->
            <div class="mb-3">
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-sm btn-outline-light"><i class="fas fa-arrow-left me-1"></i>Return</a>
            </div>

            <!-- Profile Header -->
            <div class="card profile-header mb-4">
                <div class="profile-bg"></div>
                <div class="card-body text-center pt-0">
                    <div class="profile-avatar"><i class="fas fa-user"></i></div>
                    <h3>{{ user.full_name }}</h3>
                    <p class="text-secondary">Member since Jan 2023</p>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="card mb-4">
                <div class="card-header"><i class="fas fa-user-circle me-2"></i>My Profile</div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('profile') }}" class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                                </div>
                                <small class="form-text">Username cannot be changed.</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                                </div>
                                <div class="invalid-feedback">Enter a valid email.</div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">Full Name *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-signature"></i></span>
                                <input type="text" class="form-control" name="full_name" value="{{ user.full_name }}" required>
                            </div>
                            <div class="invalid-feedback">Enter full name.</div>
                        </div>

                        <div class="row g-3 mt-3">
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="tel" class="form-control" name="phone" value="{{ user.phone or '' }}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-home"></i></span>
                                    <textarea class="form-control" name="address" rows="2">{{ user.address or '' }}</textarea>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button class="btn btn-primary"><i class="fas fa-save me-2"></i>Update Profile</button>
                        </div>
                    </form>

                    <hr>

                    <!-- Change Password -->
                    <h5 class="mb-3"><i class="fas fa-lock me-2"></i>Change Password</h5>
                    <form method="POST" action="{{ url_for('change_password') }}" class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Current Password *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                                    <input type="password" class="form-control" name="current_password" required>
                                </div>
                                <div class="invalid-feedback">Enter current password.</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">New Password *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" name="new_password" required minlength="6">
                                </div>
                                <div class="invalid-feedback">Password must be 6+ chars.</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Confirm Password *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                                    <input type="password" class="form-control" name="confirm_password" required>
                                </div>
                                <div class="invalid-feedback">Passwords must match.</div>
                            </div>
                        </div>
                        <div class="d-grid mt-3">
                            <button class="btn btn-warning"><i class="fas fa-key me-2"></i>Change Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Confirm password validation
    const newPassword = document.querySelector('[name="new_password"]');
    const confirmPassword = document.querySelector('[name="confirm_password"]');
    confirmPassword.addEventListener('input', () => {
        confirmPassword.setCustomValidity(newPassword.value !== confirmPassword.value ? 'Passwords must match' : '');
    });

    // Theme switch
    const themeSwitch = document.getElementById('themeSwitch');
    themeSwitch.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const icon = themeSwitch.querySelector('i');
        icon.classList.toggle('fa-sun');
        icon.classList.toggle('fa-moon');
    });

    // Bootstrap validation
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            });
        });
    })();
</script>
</body>
</html>
